name: Autochitect

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_ID: autochitect
  REGION: us-central1
  ARTIFACT_REGISTRY_REPO: autochitect

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: poc_agent_runner/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
        working-directory: poc_agent_runner
      - name: Validate Expert Registry
        run: pnpm run validate:registry
        working-directory: poc_agent_runner

  regression:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: poc_agent_runner/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
        working-directory: poc_agent_runner
      - name: Run Regression Evaluation
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        working-directory: poc_agent_runner
        run: |
          NODE_OPTIONS="--max-old-space-size=6144" npx ts-node --transpile-only tests/regression_eval.ts

  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.filter.outputs.should-deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check for file changes
        uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            should-deploy:
              - 'website/**'
              - 'poc_agent_runner/**'
              - 'Dockerfile'
              - '.github/workflows/autochitect.yml'

  deploy:
    needs: [regression, check-changes]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/autochitect:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/autochitect:latest \
            -f Dockerfile .
      - name: Push image to Artifact Registry
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/autochitect:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/autochitect:latest
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy autochitect \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/autochitect:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=10 \
            --memory=1Gi \
            --cpu=1 \
            --timeout=300s \
            --set-secrets=GOOGLE_API_KEY=GOOGLE_API_KEY:latest \
            --set-env-vars=NODE_ENV=production,GCS_BUCKET_NAME=${{ env.PROJECT_ID }}-autochitect-storage

      - name: Get Service URL
        run: |
          SERVICE_URL=$(gcloud run services describe autochitect --region=${{ env.REGION }} --format='value(status.url)')
          echo "✅ Autochitect Deployed: $SERVICE_URL"

