services:
  autochitect:
    build: .
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - TARGET_REPO_URL=${TARGET_REPO_URL}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - ./workspace:/tmp/autochitect
      - ./moat/lessons_learned.json:/app/moat/lessons_learned.json
      - ./registry.json:/app/registry.json
